name: Weekly Player Stats Summary

on:
  schedule:
    - cron: '0 3 * * 2'
  workflow_dispatch:

jobs:
  compare-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install @atproto/api

      - name: Run comparison script
        env:
          BLUESKY_HANDLE: mull2five.bsky.social
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
        run: node scripts/compare_stats.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/stats_changes.yml
          git commit -m "🤖 Update stats changes YAML" || echo "No changes to commit"
          git push
